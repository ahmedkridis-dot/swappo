<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09B1BA">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="../assets/brand/favicon.ico">
  <title>Reset password — Swappo</title>
  <meta name="description" content="Set a new password for your Swappo account.">
  <link rel="canonical" href="https://swappo.ae/pages/reset-password.html">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/swappo-visual.css">
  <link rel="stylesheet" href="../css/swappo-modern-2026.css">
  <!-- swp-preconnects -->
  <link rel="preconnect" href="https://cbhdjqionkvqiflmqchu.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://unpkg.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #F0FDFA 0%, #F8F9FA 100%); min-height: 100vh; margin: 0; font-family: Inter, sans-serif; }
    .reset-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 16px; }
    .reset-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 440px; padding: 40px 36px; }
    .reset-card h1 { margin: 0 0 6px; font-size: 1.5rem; color: #171717; }
    .reset-card p.sub { margin: 0 0 22px; color: #555; font-size: 0.95rem; }
    .form-field { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-size: 0.85rem; color: #555; font-weight: 600; }
    .form-field input { padding: 12px 14px; border: 1px solid #E5E7EB; border-radius: 10px; font-size: 0.95rem; font-family: inherit; transition: border-color 0.15s; }
    .form-field input:focus { outline: none; border-color: #09B1BA; box-shadow: 0 0 0 3px rgba(9,177,186,0.15); }
    .btn-submit { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #09B1BA; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; font-family: inherit; }
    .btn-submit:hover:not(:disabled) { background: #078A91; }
    .btn-submit:active:not(:disabled) { transform: translateY(1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 14px; display: none; }
    .alert.error { background: #FEE2E2; color: #991B1B; }
    .alert.success { background: #D1FAE5; color: #065F46; }
    .back-link { display: inline-block; margin-top: 18px; text-align: center; width: 100%; font-size: 0.9rem; color: #09B1BA; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .logo-top { text-align: center; margin-bottom: 18px; }
    .logo-top .logo { font-size: 1.6rem; font-weight: 800; color: #09B1BA; text-decoration: none; }
    .logo-top .logo i { margin-right: 6px; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
  <main id="main" class="reset-page">
    <section class="reset-card">
      <div class="logo-top">
        <a href="../index.html" class="logo"><i class="fas fa-handshake"></i> Swappo</a>
      </div>
      <h1 data-i18n="reset_pwd_title">Set a new password</h1>
      <p class="sub" data-i18n="reset_pwd_subtitle">Enter and confirm your new password below.</p>

      <div id="reset-alert" class="alert" role="alert"></div>

      <form id="resetForm" autocomplete="off" novalidate>
        <div class="form-field">
          <label for="new-pwd" data-i18n="reset_pwd_new">New password</label>
          <input type="password" id="new-pwd" name="new-pwd" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-field">
          <label for="confirm-pwd" data-i18n="reset_pwd_confirm">Confirm new password</label>
          <input type="password" id="confirm-pwd" name="confirm-pwd" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit" id="submit-btn" data-i18n="reset_pwd_submit">Reset password</button>
      </form>

      <a href="login.html" class="back-link" data-i18n="reset_pwd_back">← Back to login</a>
    </section>
  </main>

  <!-- Supabase CDN + Swappo auth stack -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="../js/supabase.js" defer></script>
  <script src="../js/i18n/en.js" defer></script>
  <script src="../js/i18n.js" defer></script>
  <script src="../js/toast.js" defer></script>
  <script src="../js/a11y-helpers.js" defer></script>
  <script src="../js/dashboard-link.js" defer></script>

  <script>
    (function () {
      var form = document.getElementById('resetForm');
      var newPwd = document.getElementById('new-pwd');
      var confPwd = document.getElementById('confirm-pwd');
      var btn = document.getElementById('submit-btn');
      var alertBox = document.getElementById('reset-alert');

      function showAlert(kind, msg) {
        alertBox.className = 'alert ' + kind;
        alertBox.textContent = msg;
        alertBox.style.display = 'block';
      }
      function hideAlert() { alertBox.style.display = 'none'; alertBox.textContent = ''; }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideAlert();
        var p1 = newPwd.value, p2 = confPwd.value;

        if (!p1 || p1.length < 8) {
          showAlert('error', (typeof t === 'function' ? t('reset_pwd_too_short') : 'Password must be at least 8 characters.'));
          return;
        }
        if (p1 !== p2) {
          showAlert('error', (typeof t === 'function' ? t('reset_pwd_mismatch') : 'Passwords do not match.'));
          return;
        }

        btn.disabled = true;
        try {
          if (!window.db) throw new Error('Auth service unavailable. Please refresh.');
          var res = await window.db.auth.updateUser({ password: p1 });
          if (res && res.error) throw res.error;
          var successMsg = (typeof t === 'function' ? t('reset_pwd_success') : 'Password updated. You can now sign in.');
          showAlert('success', successMsg);
          if (window.Toast) Toast.success(successMsg);
          setTimeout(function () { window.location.href = 'login.html'; }, 1600);
        } catch (err) {
          console.error('[reset-password]', err);
          showAlert('error', (err && err.message) || (typeof t === 'function' ? t('reset_pwd_failed') : 'Failed to update password.'));
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
